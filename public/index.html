<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mochi Bird</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="shell">
      <section class="hero">
        <div class="eyebrow">Discord Game</div>
        <h1>Mochi Bird</h1>
        <p>Flap your way to the top. Scores are tracked and posted back to Discord.</p>
      </section>

      <div class="grid">
        <!-- Game card -->
        <section class="card game-card">
          <div class="hud">
            <div class="stat">
              <span class="label">Score</span>
              <strong id="score">0</strong>
            </div>
            <div class="stat">
              <span class="label">Best</span>
              <strong id="bestScore">0</strong>
            </div>
            <span class="status" id="status">Loading…</span>
          </div>

          <div class="stage" id="stage">
            <canvas id="game"></canvas>
            <div class="overlay" id="overlay">
              <div class="overlay-card">
                <h2 id="overlayTitle">Mochi Bird</h2>
                <p id="overlayText">Getting things ready…</p>
                <button id="startBtn" type="button" disabled>Start</button>
              </div>
            </div>
          </div>

          <p class="hint">Tap, click, or press Space to flap.</p>
        </section>

        <!-- Leaderboard card -->
        <aside class="card lb-card">
          <div class="lb-header">
            <div>
              <div class="eyebrow">Leaderboard</div>
              <h2>Top runs</h2>
            </div>
            <button id="refreshBtn" class="ghost" type="button">Refresh</button>
          </div>
          <p class="lb-status" id="lbStatus">Loading…</p>
          <ol class="lb-list" id="lbList"></ol>
        </aside>
      </div>
    </main>

    <script type="module" src="/game.js"></script>
  </body>
</html>
